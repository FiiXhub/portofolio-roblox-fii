<style>
.center-text {

/* BUTTON USERNAME */
.copy-btn {
  margin-top: 10px;
  padding: 12px 18px;
  background: rgba(0, 255, 255, 0.1);
  border: 1px solid #0ff;
  color: #0ff;
  cursor: pointer;
  border-radius: 10px;
  font-family: 'Orbitron', sans-serif;
  transition: all 0.3s ease;
  display: inline-block;
}

/* HOVER */
.copy-btn:hover {
  background: #0ff;
  color: #000;
  box-shadow: 0 0 10px #0ff, 0 0 25px #0ff;
}

/* CLICK */
.copy-btn:active {
  transform: scale(0.95);
}

/* SUCCESS */
.copy-btn.copied {
  background: #00ff88;
  border-color: #00ff88;
  color: #000;
  box-shadow: 0 0 10px #00ff88, 0 0 25px #00ff88;
}
</style>
